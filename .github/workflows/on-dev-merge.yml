name: Dev Release

on:
  push:
    branches:
      - dev

permissions:
  id-token: write # Required for OIDC
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'yarn'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build package
        run: yarn build
        env:
          NODE_ENV: production
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Create pre-release version
        run: |
          yarn changeset pre enter alpha
          yarn changeset version

      - name: Get current version from package.json
        id: get_version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Publish to NPM (pre-release)
        run: yarn changeset publish
        env:
          NPM_CONFIG_PROVENANCE: true

      - name: Exit pre-release mode
        run: yarn changeset pre exit

      - name: Commit version changes
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Release dev version ${{ steps.get_version.outputs.version }}" || exit 0
          git push origin dev

      - name: Create GitHub Pre-Release
        continue-on-error: true
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: 'v${{ steps.get_version.outputs.version }}'
          release_name: 'Pre-release v${{ steps.get_version.outputs.version }}'
          draft: false
          prerelease: true

      - name: Create Pull Request to Main
        continue-on-error: true
        run: |
          gh pr create --base main --head dev --title "Release: v${{ steps.get_version.outputs.version }}" --body "Automated PR to merge dev changes into main for release." || echo "PR already exists"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Success
        if: success()
        uses: 8398a7/action-slack@v3
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          status: custom
          custom_payload: |
            {
              "text": "🚀 logician-ui v${{ steps.get_version.outputs.version }} pre-release deployed!",
              "attachments": [
                {
                  "color": "warning",
                  "fields": [
                    {
                      "title": "Package",
                      "value": "logician-ui",
                      "short": true
                    },
                    {
                      "title": "Version",
                      "value": "v${{ steps.get_version.outputs.version }} (alpha)",
                      "short": true
                    },
                    {
                      "title": "NPM",
                      "value": "<https://www.npmjs.com/package/logician-ui|View on NPM>",
                      "short": true
                    },
                    {
                      "title": "Install",
                      "value": "`yarn add logician-ui@${{ steps.get_version.outputs.version }}`",
                      "short": true
                    }
                  ]
                }
              ]
            }

      - name: Notify Failure
        if: failure()
        uses: 8398a7/action-slack@v3
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          status: custom
          custom_payload: |
            {
              "text": "❌ logician-ui v${{ steps.get_version.outputs.version }} pre-release failed!",
              "attachments": [
                {
                  "color": "danger",
                  "fields": [
                    {
                      "title": "Package",
                      "value": "logician-ui",
                      "short": true
                    },
                    {
                      "title": "Version",
                      "value": "v${{ steps.get_version.outputs.version }}",
                      "short": true
                    },
                    {
                      "title": "Workflow",
                      "value": "<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Workflow>",
                      "short": true
                    }
                  ]
                }
              ]
            }
