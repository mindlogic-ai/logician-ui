name: Check Component Exports

on:
  pull_request:
    branches: [dev, main]
    paths:
      - 'src/components/**'
      - 'src/index.ts'
      - 'check-component-exports.js'
      - '.github/workflows/check-exports.yml'
  push:
    branches: [dev, main]
    paths:
      - 'src/components/**'
      - 'src/index.ts'
      - 'check-component-exports.js'
      - '.github/workflows/check-exports.yml'

jobs:
  check-exports:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check component exports
        id: check-exports
        run: |
          # Run the check and capture output
          if npm run check-exports 2>&1 | tee export-check-output.txt; then
            echo "check_passed=true" >> $GITHUB_OUTPUT
          else
            echo "check_passed=false" >> $GITHUB_OUTPUT
            echo "error_output<<EOF" >> $GITHUB_OUTPUT
            cat export-check-output.txt >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Comment on PR with detailed error (if failed)
        if: steps.check-exports.outputs.check_passed == 'false' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const errorOutput = `${{ steps.check-exports.outputs.error_output }}`;

            // Parse the error output to create a more readable format
            let formattedOutput = errorOutput;

            // Replace script output prefix
            formattedOutput = formattedOutput.replace(/> @mindlogic-ai\/logician-ui@[\d\.-]+ check-exports[\s\S]*?> node check-component-exports\.js\s*/g, '');

            const commentBody = `❌ **Component Export Check Failed**

            \`\`\`
            ${formattedOutput}
            \`\`\`

            **How to fix:**
            1. Run \`npm run check-exports\` locally to see the detailed output
            2. Add the missing exports to \`src/index.ts\` as suggested
            3. Push your changes to update this PR

            **Common patterns:**
            - For new components: \`export * from './components/ComponentName';\`
            - For specific exports: \`export { Item1, Item2 } from './components/ComponentName';\`
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });

      - name: Fail the workflow if check failed
        if: steps.check-exports.outputs.check_passed == 'false'
        run: exit 1