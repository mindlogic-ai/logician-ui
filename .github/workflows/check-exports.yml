name: Check Component Exports

on:
  pull_request:
    branches: [dev, main]
    paths:
      - 'src/components/**'
      - 'src/index.ts'
      - 'check-component-exports.js'
      - '.github/workflows/check-exports.yml'
  push:
    branches: [dev, main]
    paths:
      - 'src/components/**'
      - 'src/index.ts'
      - 'check-component-exports.js'
      - '.github/workflows/check-exports.yml'

jobs:
  check-exports:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check component exports
        id: check-exports
        run: |
          set +e  # Don't exit on error
          npm run check-exports > export-check-output.txt 2>&1
          EXIT_CODE=$?

          if [ $EXIT_CODE -eq 0 ]; then
            echo "check_passed=true" >> $GITHUB_OUTPUT
          else
            echo "check_passed=false" >> $GITHUB_OUTPUT
            # Save the output to a file that can be read in next step
            echo "Error output saved to export-check-output.txt"
          fi

          exit $EXIT_CODE

      - name: Upload error output as artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: export-check-output
          path: export-check-output.txt

      - name: Comment on PR with detailed error (if failed)
        if: failure() && github.event_name == 'pull_request'
        run: |
          # Read the error output
          ERROR_OUTPUT=$(cat export-check-output.txt)

          # Clean up the output
          CLEAN_OUTPUT=$(echo "$ERROR_OUTPUT" | sed 's/> @mindlogic-ai\/logician-ui@[^ ]* check-exports//' | sed 's/> node check-component-exports\.js//' | sed '/^$/d')

          # Create comment file
          cat > comment.md << 'EOF'
          ❌ **Component Export Check Failed**

          ```
          EOF
          echo "$CLEAN_OUTPUT" >> comment.md
          cat >> comment.md << 'EOF'
          ```

          **How to fix:**
          1. Add the missing exports to `src/index.ts` as shown above
          2. Push your changes to update this PR

          **Common patterns:**
          - For new components: `export * from './components/ComponentName';`
          - For specific exports: `export { Item1, Item2 } from './components/ComponentName';`
          EOF

          # Post comment using gh CLI
          gh pr comment ${{ github.event.pull_request.number }} --body-file comment.md
        env:
          GH_TOKEN: ${{ github.token }}