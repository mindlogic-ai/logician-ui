name: Check Component Exports

on:
  pull_request:
    branches: [dev, main]
    paths:
      - 'src/components/**'
      - 'src/index.ts'
      - 'check-component-exports.js'
      - '.github/workflows/check-exports.yml'
  push:
    branches: [dev, main]
    paths:
      - 'src/components/**'
      - 'src/index.ts'
      - 'check-component-exports.js'
      - '.github/workflows/check-exports.yml'

jobs:
  check-exports:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check component exports
        run: npm run check-exports

      - name: Comment on PR (if failed)
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **Component Export Check Failed**\n\nSome components are not properly exported in `src/index.ts`. Please run `npm run check-exports` locally to see the missing exports and fix them.'
            })