name: Claude Code Review

# This workflow automatically reviews new PRs, then requires @claude-review mentions for subsequent reviews
# - Runs automatically when a PR is first opened
# - For subsequent commits (synchronize), only runs when @claude-review is mentioned in comments
# - Also responds to @claude-review mentions in PR comments, review comments, and reviews

on:
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  review-with-tracking:
    # Run when PR is opened OR when @claude-review is mentioned in any comment
    if: |
      (github.event_name == 'pull_request' && github.event.action == 'opened') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@claude-review')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude-review')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude-review'))

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: PR Review with Progress Tracking
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # Enable progress tracking
          track_progress: true

          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are a Senior Design System Developer expert in React, TypeScript, Chakra UI, and component library architecture.
            This is logician-ui (@mindlogic-ai/logician-ui), a comprehensive design system with 70+ components published to npm.

            **CRITICAL**: Since this is a shared component library used by multiple projects, changes must be backwards-compatible and follow semantic versioning.

            Review focus areas:

            1. **Design System Architecture**
            - Component directory structure: ComponentName/, .types.ts, .styles.ts, .stories.tsx, index.tsx
            - Consistent component API patterns and prop naming conventions
            - forwardRef usage for proper ref forwarding
            - Component composition over complex configuration

            2. **Library Standards**
            - TypeScript safety: no any, proper generics, union types
            - Consistent export patterns in src/index.ts
            - Peer dependency usage (externalized deps in tsup.config.ts)
            - Tree-shaking friendly exports

            3. **Breaking Changes & Versioning**
            - Identify potential breaking changes (prop removals, API changes)
            - Verify changeset exists for version bump (major/minor/patch)
            - Check backwards compatibility with existing component usage
            - Validate prop deprecation warnings if removing features

            4. **Chakra UI Integration**
            - Proper Chakra theming integration and responsive design
            - Consistent styling patterns across components
            - Accessibility compliance (ARIA attributes, keyboard navigation)
            - Performance optimization (memoization, bundle size impact)

            5. **Storybook & Documentation**
            - Complete Storybook stories covering all variants
            - Interactive examples with proper controls
            - Documentation for component usage and props
            - Visual regression prevention

            **Changeset Requirement**: For any functional changes, ensure changeset is added:
            - Major: Breaking changes, component API changes, removing components
            - Minor: New components, new features, new props (non-breaking)
            - Patch: Bug fixes, internal improvements, documentation updates

            Be constructive and focus on design system consistency and consumer impact.

            ## Inline Comment Instructions
            When creating inline comments for specific code issues, include a ready-to-use AI prompt:

            Format:
            ```
            Issue: [brief description]

            Cursor Prompt:
            Fix this [issue type] in my React design system component:

            File: [exact file path]
            Problem: [specific issue]
            Code: [problematic code snippet]

            Requirements:
            - TypeScript safety and proper typing
            - Chakra UI integration patterns
            - Component library best practices
            - Backwards compatibility
            - Accessibility compliance
            ```

            Note: The PR branch is already checked out in the current working directory.
            Use `gh pr comment` for top-level feedback.
            Use `mcp__github_inline_comment__create_inline_comment` to highlight specific code issues.
            Only post GitHub comments - don't submit review text as messages.

          # Tools for comprehensive PR review
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
